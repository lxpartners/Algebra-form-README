<div class="wrap">

<!-- CAPA -->
<div style="margin:44px 0 32px">
  <div class="sec-title">Know Your Customer</div>
  <div class="sec-sub">NIPC 513912878 · Lei n.º 83/2017 · Av. da Liberdade, 110, 5.º · Confidencial<br>Preencha todas as secções aplicáveis. <span style="color:var(--err)">*</span> Campo obrigatório.</div>

  <div class="internal-section" style="margin-bottom:24px">
    <div class="card">
      <div class="clbl">Referência do Processo</div>
      <div class="g2">
        <div class="f"><label class="req">Ref. Interna</label><input type="text" name="ref_interna" id="ref_interna" readonly style="cursor:default;opacity:.6;background:#f5f5f5"><span style="font-size:9px;color:var(--ok)" id="ref-auto-lbl">Gerada automaticamente</span></div>
        <div class="f"><label class="req">ID Devedor(es)</label><input type="text" name="ref_devedor" data-req-pt="ID Devedor(es)" data-req-en="Debtor ID" placeholder="Identificação do(s) Devedor(es)"><span class="f-err">Campo obrigatório</span></div>
        <div class="f s2"><label>Identificação do(s) Crédito(s)</label><input type="text" name="ref_credito" placeholder="N.º contrato ou referência"></div>
      </div>
    </div>
  </div>

  <div class="type-toggle" id="type-toggle">
    <button class="type-btn active" id="btn-singular" onclick="setType('singular')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span id="type-singular-lbl">Pessoa Singular</span>
    </button>
    <button class="type-btn" id="btn-coletiva" onclick="setType('coletiva')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
      <span id="type-coletiva-lbl">Pessoa Coletiva</span>
    </button>
  </div>
</div>
